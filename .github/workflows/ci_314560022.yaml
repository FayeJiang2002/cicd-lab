name: CI_314560022

# 任意 branch push 或建立 PR 都會觸發
on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: TypeScript / Prettier / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 要求項目 1: TypeScript typecheck
      - name: TypeScript typecheck
        run: npm run typecheck

      # 要求項目 2: Prettier check
      - name: Prettier check
        run: npm run format:check

      # 要求項目 3: 執行測試,並輸出 JUnit XML 給後續報告步驟使用
      - name: Run tests (Vitest, JUnit reporter)
        run: |
          mkdir -p reports
          npm test -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/vitest-junit.xml

      # 將測試結果以純文字表格寫入 Job Summary (避免第三方 action 帶 emoji)
      - name: Publish test summary (plain text)
        if: always()
        env:
          JUNIT_XML: reports/vitest-junit.xml
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = process.env.JUNIT_XML;
          if (!fs.existsSync(path)) {
            console.log('## Vitest Test Report');
            console.log('');
            console.log('No JUnit XML produced at ' + path);
            process.exit(0);
          }
          const xml = fs.readFileSync(path, 'utf8');
          const root = xml.match(/<testsuites[^>]*>/);
          if (!root) {
            console.log('## Vitest Test Report');
            console.log('');
            console.log('Could not parse ' + path);
            process.exit(0);
          }
          const r = root[0];
          const tests = +(r.match(/tests="(\d+)"/)?.[1] ?? 0);
          const failures = +(r.match(/failures="(\d+)"/)?.[1] ?? 0);
          const errors = +(r.match(/errors="(\d+)"/)?.[1] ?? 0);
          const skipped = [...xml.matchAll(/skipped="(\d+)"/g)]
            .reduce((a, [, n]) => a + Number(n), 0);
          const passed = tests - failures - errors - skipped;
          const out = [
            '## Vitest Test Report',
            '',
            '| Metric  | Count |',
            '| ------- | ----- |',
            `| Tests   | ${tests} |`,
            `| Passed  | ${passed} |`,
            `| Failed  | ${failures} |`,
            `| Errors  | ${errors} |`,
            `| Skipped | ${skipped} |`
          ];
          if (failures > 0 || errors > 0) {
            out.push('', '### Failing tests', '');
            const re = /<testcase[^>]*name="([^"]+)"[^>]*>(?:[\s\S]*?)<(failure|error)/g;
            let m;
            while ((m = re.exec(xml)) !== null) {
              const name = m[1]
                .replace(/&gt;/g, '>')
                .replace(/&lt;/g, '<')
                .replace(/&amp;/g, '&')
                .replace(/&quot;/g, '"')
                .replace(/&apos;/g, "'");
              out.push(`- ${name}`);
            }
          }
          console.log(out.join('\n'));
          NODE

      # 同時 upload artifact,點進 run 還能下載原始 XML
      - name: Upload JUnit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: reports/
          if-no-files-found: error
